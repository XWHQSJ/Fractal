name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
          - os: macos-14
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Build
        run: |
          cmake -B build -S . -DEASYX_COMPAT_USE_SDL=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p dist
          # Collect all demo executables (skip test binaries and cmake artifacts)
          for f in build/*; do
            if [ -x "$f" ] && [ -f "$f" ] && file "$f" | grep -qiE 'executable|Mach-O'; then
              cp "$f" dist/
            fi
          done
          tar czf fractal-${{ matrix.name }}.tar.gz -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: fractal-${{ matrix.name }}.tar.gz
