name: Deploy WASM demos to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61

      - name: Build WASM demos
        run: |
          emcmake cmake -B build-web -S . -DEASYX_COMPAT_USE_SDL=ON
          emmake cmake --build build-web -j$(nproc)

      - name: Prepare site
        run: |
          mkdir -p site
          # Copy WASM outputs
          for f in build-web/*.html; do
            base=$(basename "$f" .html)
            cp "build-web/${base}.html" site/
            cp "build-web/${base}.js" site/
            cp "build-web/${base}.wasm" site/
          done
          # Copy existing gallery
          cp docs/index.html site/gallery.html
          # Generate index page
          cat > site/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Fractal -- Live WASM Demos</title>
            <style>
              :root {
                --bg: #0d1117;
                --surface: #161b22;
                --border: #30363d;
                --text: #e6edf3;
                --muted: #8b949e;
                --accent: #58a6ff;
                --green: #3fb950;
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
              }
              header {
                text-align: center;
                padding: 3rem 1rem 2rem;
                border-bottom: 1px solid var(--border);
              }
              header h1 { font-size: 2.5rem; letter-spacing: -0.02em; }
              header p { color: var(--muted); margin-top: 0.5rem; }
              main { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1.5rem;
                margin-top: 2rem;
              }
              .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.5rem;
                transition: border-color 0.2s, transform 0.2s;
              }
              .card:hover { border-color: var(--accent); transform: translateY(-2px); }
              .card h3 { color: var(--accent); margin-bottom: 0.5rem; }
              .card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
              .card a {
                display: inline-block;
                background: var(--accent);
                color: var(--bg);
                padding: 0.4em 1em;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 600;
                font-size: 0.85rem;
              }
              .card a:hover { opacity: 0.9; }
              .interactive { border-left: 3px solid var(--green); }
              footer {
                text-align: center;
                padding: 2rem;
                color: var(--muted);
                font-size: 0.85rem;
                border-top: 1px solid var(--border);
                margin-top: 3rem;
              }
              footer a { color: var(--accent); text-decoration: none; }
            </style>
          </head>
          <body>
            <header>
              <h1>Fractal</h1>
              <p>Classic fractal programs in C++ -- compiled to WebAssembly</p>
            </header>
            <main>
              <h2 style="font-size:1.3rem; color:var(--muted); margin-bottom:0.5rem;">Live Demos</h2>
              <div class="grid">
                <div class="card interactive">
                  <h3>Mandelbrot (Interactive)</h3>
                  <p>Click to zoom 3x. Press R to reset, Q/Esc to quit.</p>
                  <a href="mandelbrot_interactive.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Mandelbrot Set</h3>
                  <p>Escape-time rendering with 256-color rainbow palette.</p>
                  <a href="mandelbrot.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Barnsley Fern</h3>
                  <p>4 weighted affine transforms, 200k iterations.</p>
                  <a href="fern.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Dragon Curve</h3>
                  <p>Recursive paper-folding fractal, order 14.</p>
                  <a href="dragon.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Hilbert Curve</h3>
                  <p>Order-5 space-filling curve with rainbow gradient.</p>
                  <a href="hilbert.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Koch Snowflake</h3>
                  <p>Recursive Koch curve forming a snowflake.</p>
                  <a href="kochsnow.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Sierpinski Triangle</h3>
                  <p>Chaos-game point iteration, 30k points.</p>
                  <a href="sierpinski.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Sierpinski Carpet</h3>
                  <p>Recursive 9-subdivision carpet fractal.</p>
                  <a href="sierpinski_carpet.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Cantor Set</h3>
                  <p>Middle-third removal line fractal.</p>
                  <a href="cantor.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Arborescent Tree</h3>
                  <p>Recursive branching tree with depth gradient.</p>
                  <a href="arboresent.html">Launch</a>
                </div>
                <div class="card interactive">
                  <h3>Starfield</h3>
                  <p>Animated star particles with variable speeds.</p>
                  <a href="stars.html">Launch</a>
                </div>
                <div class="card">
                  <h3>Rainbow</h3>
                  <p>HSL gradient with concentric rainbow arcs.</p>
                  <a href="rainbow.html">Launch</a>
                </div>
                <div class="card">
                  <h3>L-System Interpreter</h3>
                  <p>General L-system: Koch, Dragon, Plant.</p>
                  <a href="lsystem_demo.html">Launch</a>
                </div>
              </div>
              <p style="margin-top:2rem;text-align:center;">
                <a href="gallery.html" style="color:var(--accent);">Math Gallery (formulas)</a>
              </p>
            </main>
            <footer>
              MIT License -- <a href="https://github.com/XWHQSJ/Fractal">Source on GitHub</a>
            </footer>
          </body>
          </html>
          INDEXEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
